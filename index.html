<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รวมวิดีโอสื่อการสอน</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* จัดรูปแบบโครงสร้างพื้นฐาน */
        body {
            font-family: 'Prompt', sans-serif;
            background-color: #f0f2f5; /* สีพื้นหลัง */
            color: #333;
            margin: 0;
            padding: 20px;
        }
        
        /* กล่องเนื้อหาหลัก */
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* หัวข้อหน้าเว็บ */
        h1 {
            text-align: center;
            color: #1a73e8; /* สีน้ำเงิน */
            margin-top: 0;
            margin-bottom: 40px;
            font-weight: 600;
        }

        /* กล่องสำหรับแต่ละรายวิชา */
        .subject-group {
            margin-bottom: 40px;
        }

        /* ชื่อวิชา */
        .subject-title {
            font-size: 1.4em;
            color: #2c3e50;
            border-bottom: 3px solid #1a73e8;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-weight: 500;
        }

        /* กล่องของแต่ละคลิป */
        .video-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        /* เอฟเฟกต์ตอนเอาเมาส์ชี้กล่อง */
        .video-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
            border-color: #d1d5db;
        }

        /* ข้อมูลคลิป */
        .video-info {
            display: flex;
            flex-direction: column;
        }

        .video-name {
            font-size: 1.1em;
            font-weight: 500;
            color: #34495e;
        }

        .video-date {
            font-size: 0.9em;
            color: #7f8c8d;
            margin-top: 5px;
        }

        /* ปุ่มกดดูวิดีโอ */
        .watch-btn {
            background-color: #ff0000; /* สีแดงแบบ YouTube */
            color: #ffffff;
            text-decoration: none;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 500;
            transition: background-color 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .watch-btn:hover {
            background-color: #cc0000;
        }

        /* ทำให้เว็บรองรับมือถือ */
        @media (max-width: 600px) {
            .video-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .watch-btn {
                width: 100%;
                justify-content: center;
                box-sizing: border-box;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📚 คลังวิดีโอประกอบการเรียน</h1>

        <div class="subject-group">
            <div class="subject-title">📌 วิชา Signal and System</div>
            
            <div class="video-card">
                <div class="video-info">
                    <span class="video-name">คลิปที่ 1 (บรรยายเนื้อหา)</span>
                    <span class="video-date">บันทึกเมื่อวันที่: 4/7/69</span>
                </div>
                <a href="https://youtu.be/0Nx5zzJgkes" target="_blank" class="watch-btn">
                    ▶ ดูวิดีโอ
                </a>
            </div>
            </div>

        <div class="subject-group">
            <div class="subject-title">📌 วิชา Power Trans</div>
            
            <div class="video-card">
                <div class="video-info">
                    <span class="video-name">คลิปที่ 1 (บรรยายเนื้อหา)</span>
                    <span class="video-date">บันทึกเมื่อวันที่: 5/7/69</span>
                </div>
                <a href="https://youtu.be/l8nAZFygJiw" target="_blank" class="watch-btn">
                    ▶ ดูวิดีโอ
                </a>
            </div>
        </div>

    </div>

</body>
</html>
